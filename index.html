<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Social Media Feed</title>

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- Navbar -->

    <header class="navbar">

        <div class="logo">
            SocialHub
        </div>

        <ul class="nav-links">

            <li><a href="#">Home</a></li>

            <li><a href="#">Explore</a></li>

            <li><a href="#">Messages</a></li>

            <li><a href="#">Profile</a></li>

        </ul>

    </header>

    <!-- Feed Section -->

    <section class="feed-container">

        <!-- Post 1 -->

        <div class="feed-card">

            <div class="profile">

                <img src="https://randomuser.me/api/portraits/men/32.jpg"
                    alt="User">

                <div>

                    <h3>John Doe</h3>

                    <span>2 hours ago</span>

                </div>

            </div>

            <img class="post-image"
                src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop"
                alt="Post">

            <p>
                Exploring beautiful nature and enjoying the weekend 🌿
            </p>

            <div class="actions">

                <button>❤️ Like</button>

                <button>💬 Comment</button>

                <button>📤 Share</button>

            </div>

        </div>

        <!-- Post 2 -->

        <div class="feed-card">

            <div class="profile">

                <img src="https://randomuser.me/api/portraits/women/44.jpg"
                    alt="User">

                <div>

                    <h3>Emma Smith</h3>

                    <span>5 hours ago</span>

                </div>

            </div>

            <img class="post-image"
                src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop"
                alt="Post">

            <p>
                Working on my new frontend development project 💻
            </p>

            <div class="actions">

                <button>❤️ Like</button>

                <button>💬 Comment</button>

                <button>📤 Share</button>

            </div>

        </div>

    </section>

</body>

</html>
